spring.application.name=aipa
spring.config.import=optional:classpath:database_user.properties
spring.datasource.url=${AIPA_DB_URL:jdbc:h2:file:./data/aipa;MODE=MySQL;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${AIPA_DB_DRIVER:org.h2.Driver}
spring.datasource.username=${AIPA_DB_USERNAME:sa}
spring.datasource.password=${AIPA_DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${AIPA_MAIL_USERNAME:}
spring.mail.password=${AIPA_MAIL_PASSWORD:}
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.jwt.secret=ZGljaG9uZ3RhaS1haXBhLXNlY3JldC1rZXktZm9yLWp3dC0yMDI2LTAyLTI1
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=2592000000
auth.face-login-threshold=0.82
